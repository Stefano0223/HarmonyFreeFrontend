<!-- Upload Section Begin -->
 <div style="margin-top: 20px;">
<section class="upload-page spad">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <div class="upload-card">

                    <div class="upload-header">
                        <i class="fa fa-cloud-upload"></i>
                        <h2 style="margin-top: 10px; font-family: sans-serif; color: white;" >Upload Your Music</h2>
                        <p style="margin-top: 10px;  font-family: sans-serif;">
                            Share your Creative Commons tracks with listeners,
                            creators, and artists around the world.
                        </p>
                    </div>

                    <form id="uploadForm">

                        <div class="form-group">
                            <label><i class="fa fa-music"></i> Audio File</label>
                            <input type="file" name="audio" accept="audio/*" required>
                        </div>

                        <div class="form-group">
                            <label><i class="fa fa-headphones"></i> Track Title</label>
                            <input type="text" name="title" placeholder="Enter track title" required>
                        </div>

                        <div class="form-group">
                            <label><i class="fa fa-user"></i> Artist Name</label>
                            <input type="text" name="artist" placeholder="Enter artist name" required>
                        </div>

                        <div class="form-group">
                            <label><i class="fa fa-tags"></i> Genre</label>
                            <select name="genre">
                                <option>Techno</option>
                                <option>Ambient</option>
                                <option>Lo-Fi</option>
                                <option>House</option>
                                <option>Experimental</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label><i class="fa fa-copyright"></i> Creative Commons License</label>
                            <select name="license" required>
                                <option>CC BY</option>
                                <option>CC BY-SA</option>
                                <option>CC0</option>
                                <option>CC BY-NC</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label><i class="fa fa-image"></i> Cover Image</label>
                            <input type="file" name="cover" accept="image/*">
                        </div>

                        <button type="submit" class="site-btn" style="margin-top: 10px;  font-family: sans-serif; color: white;">
                            <i class="fa fa-upload"></i > Upload Track
                        </button>

                    </form>

                </div>

            </div>
        </div>
    </div>
    </div>
</section>
