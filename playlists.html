    <div class="container mt-5">

    <div class="d-flex justify-content-between mb-4">

        <h1>My Playlists</h1>

        <button
            type="button"
            id="create-playlist-btn"
            class="btn btn-primary"
            data-toggle="modal"
            data-target="#createPlaylistModal">
            Create Playlist
        </button>

    </div>

    <div id="playlists-container">

        <!-- Qui verranno inserite dinamicamente le playlist dell'utente -->

    </div>

</div>

<div
    class="modal fade"
    id="createPlaylistModal"
    tabindex="-1"
    role="dialog"
    aria-labelledby="createPlaylistModalLabel"
    aria-hidden="true">

    <div class="modal-dialog modal-dialog-centered" role="document">

        <div class="modal-content">

            <div class="modal-header">

                <h5
                    class="modal-title"
                    id="createPlaylistModalLabel">
                    Create Playlist
                </h5>

                <button
                    type="button"
                    class="close"
                    data-dismiss="modal"
                    aria-label="Close">

                    <span aria-hidden="true">&times;</span>

                </button>

            </div>

            <div class="modal-body">

                <form id="createPlaylistForm">

                    <div class="form-group">

                        <label for="playlistTitle">
                            Title
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            id="playlistTitle"
                            required>

                    </div>

                    <div class="form-group">

                        <label for="playlistDescription">
                            Description
                        </label>

                        <textarea
                            class="form-control"
                            id="playlistDescription"
                            rows="3">
                        </textarea>

                    </div>

                </form>

            </div>

            <div class="form-group">
                <div class="form-check">
                    <input
                        class="form-check-input"
                        type="checkbox"
                        id="playlistPublic">

                    <label
                        class="form-check-label"
                        for="playlistPublic">
                        Public playlist
                    </label>
                </div>
            </div>

            <div class="modal-footer">

                <button
                    type="button"
                    class="btn btn-secondary"
                    data-dismiss="modal">
                    Cancel
                </button>

                <button
                    type="button"
                    class="btn btn-primary"
                    id="savePlaylistBtn">
                    Create
                </button>

            </div>

        </div>

    </div>

</div>
