<div class="auth-container">

    <div class="auth-box">

        <!-- LOGIN -->

        <form class="form-box active" id="loginForm">

            <h2 style="font-family: sans-serif;">Log in</h2>

            <input id="login-email" type="email" placeholder="Email" required>

            <input id="login-password" type="password" placeholder="Password" required>

            <button id="login-button" type="submit">
                Log in
            </button>

            <div class="divider">
                <span>or</span>
            </div>

            <div class="social-login">

                <button type="button" class="social-btn google">
                    <i class="fa-brands fa-google"></i>
                    Log in with Google
                </button>

                <button type="button" class="social-btn facebook">
                    <i class="fa-brands fa-facebook-f"></i>
                     Log in with Facebook
                </button>

             
            </div>

            <p style="font-family: sans-serif;">
                Don't have an account?
                <a onclick="showRegister()">Register now!</a>
            </p>

        </form>

        <!-- REGISTER -->

        <form class="form-box" id="registerForm">

            <h2 style="font-family: sans-serif;">Register</h2>

            <input id="register-first-name" type="text" placeholder="First Name" required>

            <input id="register-last-name" type="text" placeholder="Last name" required>

            <input id="register-username" type="text" placeholder="Username" required>

            <input id="register-email" type="email" placeholder="Email" required>

            <input id="register-password" type="password" placeholder="Password" required>

            <input id="register-retype-password" type="password" placeholder="Retype password" required>

            <button id="register-button" type="submit">
                Register!
            </button>

            <div class="divider">
                <span>or</span>
            </div>

            <div class="social-login">

                <button type="button" class="social-btn google">
                    <i class="fa-brands fa-google"></i>
                    Sign up with Google
                </button>

                <button type="button" class="social-btn facebook">
                    <i class="fa-brands fa-facebook-f"></i>
                    Sign up with Facebook
                </button>

               
            </div>

            <p style="font-family: sans-serif;">
                Do you already have an account?
                <a onclick="showLogin()">Sign in</a>
            </p>

        </form>

    </div>

</div>

<script>

function showRegister() {

    document
        .getElementById("loginForm")
        .classList.remove("active");

    document
        .getElementById("registerForm")
        .classList.add("active");
}

function showLogin() {

    document
        .getElementById("registerForm")
        .classList.remove("active");

    document
        .getElementById("loginForm")
        .classList.add("active");
}

</script>
