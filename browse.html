    <!-- Browse Section -->
    <section class="container mt-5">

        <div class="text-center mb-5">
            <h1 style="margin-top: 10px;">Browse Music</h1>
            <p>Search, discover and download Creative Commons tracks.</p>
        </div>

        <!-- Search -->
        <div class="row mb-4">
            <div class="col-md-12">
                <input
                        type="text"
                        id="search-input"
                        class="form-control"
                        placeholder="Search tracks...">
            </div>
        </div>

        <!-- Filters -->
        <div class="row mb-4">

            <div class="col-md-3">
                <input
                        type="text"
                        id="title-filter"
                        class="form-control"
                        placeholder="Title">
            </div>

            <div class="col-md-3">
                <input
                        type="text"
                        id="artist-filter"
                        class="form-control"
                        placeholder="Artist">
            </div>

            <div class="col-md-3">
                <input
                        type="text"
                        id="album-filter"
                        class="form-control"
                        placeholder="Album">
            </div>

            <div class="col-md-3">
                <input
                        type="text"
                        id="genre-filter"
                        class="form-control"
                        placeholder="Genre">
            </div>

        </div>
 </div>
        <!-- Search Button -->
        <div class="row mb-5">
            <div class="col-md-12 text-center">
                <button
                        id="search-btn"
                        class="btn btn-primary">

                </button>
            </div>
        </div>

        <!-- Results -->
        <div class="row">
            <div class="col-md-12">

                <h3>Results</h3>

                <div id="tracks-container">

                    <!-- qua compariranno i risultati della ricerca -->

                </div>

            </div>
        </div>

        <!-- Audio Player -->
        <div class="row mt-5">
            <div class="col-md-12">

                <h3>Player</h3>

                <audio
                        id="audio-player"
                        controls
                        style="width: 100%;">
                    Your browser does not support audio playback.
                </audio>

            </div>
        </div>

    </section>
