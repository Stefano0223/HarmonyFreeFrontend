     <!-- PROFILE PAGE -->
      <div></div>
<section class="profile-page">

    <div class="profile-container">

        <!-- LEFT -->
        <div class="profile-left">

            <div class="profile-avatar">
                <label for="uploadAvatar">
                    <img src="img/default-user.png" id="avatarPreview">
                    <input type="file" id="uploadAvatar" accept="image/*">
                    <span class="change-avatar">Change photo</span>
                </label>
            </div>

            <h2 id="profile-username" style="color:white;"></h2>

            <p id="profile-firstname" style="color:white;"></p>

            <p id="profile-lastname" style="color:white;"></p>

            <p id="profile-email" style="color:white;"></p>

            <button id="edit-profile-btn" class="edit-btn"><i class="fa fa-edit"></i>Edit Profile</button>

        </div>

        <!-- RIGHT -->
        <div class="profile-right">

            <div class="tabs">

                <button class="tab"><a href="favorites.html">❤️ Favorites</a></button>
                <button class="tab"><a href="playlists.html">🎵 My Playlists</a></button>
                <button class="tab">⚙️ Settings</button>

            </div>

            <!-- CONTENT -->
            <div class="tab-content">

                <div class="box">
                <h3 style="color:white;">My Favorite Tracks</h3>

                <div id="profile-favorites-container"></div>
            </div>

            <div class="box">
                <h3 style="color:white;">My Playlists</h3>

                <div id="profile-playlists-container"></div>
            </div>

            </div>

        </div>

    </div>

</section>
<!-- Footer Section Begin -->

                    </div>

    <div
    class="modal fade"
    id="editProfileModal"
    tabindex="-1">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content">

                <div class="modal-header">
                <h5 class="modal-title">
                    Edit Profile
                </h5>

                <button
                        type="button"
                        class="close"
                        data-dismiss="modal"
                        aria-label="Close">
                    
                        <span aria-hidden="true">
                            &times;
                        </span>
                        
                </button>
            </div>

                <div class="modal-body">

                    <div class="mb-3">
                        <label>Username</label>
                        <input
                            id="modal-username"
                            class="form-control"
                            type="text">
                    </div>

                    <div class="mb-3">
                        <label>First Name</label>
                        <input
                            id="modal-firstname"
                            class="form-control"
                            type="text">
                    </div>

                    <div class="mb-3">
                        <label>Last Name</label>
                        <input
                            id="modal-lastname"
                            class="form-control"
                            type="text">
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <input
                            id="modal-email"
                            class="form-control"
                            type="email">
                    </div>

                </div>

                <div class="modal-footer">

                    <button
                        id="save-profile-btn"
                        type="button"
                        class="btn btn-primary">
                        Save
                    </button>

                </div>

            </div>

        </div>

    </div>
