     <!-- PROFILE PAGE -->

<section class="profile-page">


    <div class="profile-container">


        <!-- LEFT CARD -->

        <div class="profile-left">


            <div class="profile-avatar">


                <label for="uploadAvatar">

                    <img 
                    src="img/default-user.png"
                    id="avatarPreview">


                    <input 
                    type="file"
                    id="uploadAvatar"
                    accept="image/*">


                    <span class="change-avatar">
                        <i class="fa fa-camera"></i>
                        Change photo
                    </span>


                </label>


            </div>



            <h2 id="profile-username" style="font-family: sans-serif;">
                Username
            </h2>


            <p id="profile-firstname"
               class="profile-info">
            </p>


            <p id="profile-lastname"
               class="profile-info">
            </p>


            <p id="profile-email"
               class="profile-info">
            </p>



            <button
            id="edit-profile-btn"
            class="edit-btn">

                <i class="fa fa-edit" ></i>

                Edit Profile

            </button>


        </div>






        <!-- RIGHT CARD -->


        <div class="profile-right">



            <div class="tabs">


                <a href="favorites.html"
                class="tab active">

                    <i class="fa fa-heart"></i>

                    Favorites

                </a>



                <a href="playlists.html"
                class="tab">

                    <i class="fa fa-music"></i>

                    My Playlists

                </a>



                <button class="tab">

                    <i class="fa fa-gear"></i>

                    Settings

                </button>



            </div>






            <!-- FAVORITES -->


            <div class="box">


                <h3 style="font-family: sans-serif;">
                    <i class="fa fa-heart" ></i>
                    My Favorite Tracks
                </h3>


                <div 
                id="profile-favorites-container"
                class="list-container">


                    <!-- tracks -->


                </div>


            </div>






            <!-- PLAYLISTS -->


            <div class="box">


                <h3 style="font-family: sans-serif;">

                    <i class="fa fa-list"></i>

                    My Playlists

                </h3>



                <div
                id="profile-playlists-container"
                class="list-container">


                    <!-- playlists -->


                </div>



            </div>




        </div>



    </div>


</section>

</section>


    <div
    class="modal fade"
    id="editProfileModal"
    tabindex="-1">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content">

                <div class="modal-header">
                <h5 class="modal-title">
                    Edit Profile
                </h5>

                <button
                        type="button"
                        class="close"
                        data-dismiss="modal"
                        aria-label="Close">
                    
                        <span aria-hidden="true">
                            &times;
                        </span>
                        
                </button>
            </div>

                <div class="modal-body">

                    <div class="mb-3">
                        <label>Username</label>
                        <input
                            id="modal-username"
                            class="form-control"
                            type="text">
                    </div>

                    <div class="mb-3">
                        <label>First Name</label>
                        <input
                            id="modal-firstname"
                            class="form-control"
                            type="text">
                    </div>

                    <div class="mb-3">
                        <label>Last Name</label>
                        <input
                            id="modal-lastname"
                            class="form-control"
                            type="text">
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <input
                            id="modal-email"
                            class="form-control"
                            type="email">
                    </div>

                </div>

                <div class="modal-footer">

                    <button
                        id="save-profile-btn"
                        type="button"
                        class="btn btn-primary">
                        Save
                    </button>

                </div>

            </div>

        </div>

    </div>
